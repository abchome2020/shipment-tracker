<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>包裝站掃碼</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');
:root {
  --bg: #f5f0eb; --surface: #ffffff; --border: #e0d6cc;
  --accent: #b5956a; --accent2: #f0e6d8; --accent3: #8a6d4e;
  --danger: #c0544f; --text: #3a2e24; --muted: #9c8878;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 8px rgba(181,149,106,0.08); }
.header-title { font-family: 'Space Mono', monospace; font-size: 13px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
.station-badge { background: var(--accent2); color: var(--accent3); font-size: 11px; font-family: 'Space Mono', monospace; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); }
.main { flex: 1; padding: 24px 20px; display: flex; flex-direction: column; gap: 20px; max-width: 480px; margin: 0 auto; width: 100%; }
.status-bar { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.status-dot.active { background: var(--accent); box-shadow: 0 0 8px rgba(181,149,106,0.5); }
.status-dot.error { background: var(--danger); }
.status-text { font-size: 13px; color: var(--muted); font-family: 'Space Mono', monospace; }
.status-text.active { color: var(--accent3); }
.status-text.error { color: var(--danger); }
.steps-bar { display: flex; gap: 8px; }
.step-pill { flex: 1; padding: 8px 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; text-align: center; font-size: 11px; font-family: 'Space Mono', monospace; color: var(--muted); transition: all 0.3s; }
.step-pill.active { border-color: var(--accent); color: var(--accent3); background: var(--accent2); }
.step-pill.done { border-color: var(--accent); color: var(--accent); background: var(--accent2); }
.step-pill.done::before { content: '✓ '; }
.section { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; opacity: 0.45; pointer-events: none; transition: opacity 0.3s; }
.section.enabled { opacity: 1; pointer-events: all; }
.section-label { padding: 14px 18px 10px; font-size: 11px; font-family: 'Space Mono', monospace; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid var(--border); background: #faf7f4; }
.section-area { padding: 18px; display: flex; flex-direction: column; gap: 14px; }
.camera-btn { width: 100%; padding: 22px 20px; background: var(--accent); border: none; border-radius: 12px; color: #fff; font-family: 'Noto Sans TC', sans-serif; font-size: 17px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; }
.camera-btn:active { background: var(--accent3); }
.camera-btn svg { width: 26px; height: 26px; }
.photo-input-hidden { position: absolute; left: -9999px; opacity: 0; width: 1px; height: 1px; }
.preview-wrap { display: none; flex-direction: column; gap: 10px; }
.preview-wrap.show { display: flex; }
.preview-img { width: 100%; border-radius: 10px; border: 1px solid var(--border); max-height: 200px; object-fit: cover; }
.photo-done-hint { text-align: center; font-size: 12px; color: var(--accent3); font-family: 'Space Mono', monospace; padding: 4px 0; }
.retake-btn { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--border); border-radius: 10px; color: var(--muted); font-family: 'Noto Sans TC', sans-serif; font-size: 14px; cursor: pointer; }
.ai-status { font-size: 13px; font-family: 'Space Mono', monospace; color: var(--muted); padding: 8px 12px; background: var(--bg); border-radius: 8px; display: none; }
.ai-status.show { display: block; }
.ai-status.success { color: var(--accent3); }
.ai-status.error { color: var(--danger); }
.code-confirm-wrap { display: none; flex-direction: column; gap: 8px; }
.code-confirm-wrap.show { display: flex; }
.confirm-label { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; }
.text-input { width: 100%; padding: 14px 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 15px; outline: none; }
.text-input:focus { border-color: var(--accent); }
.text-input::placeholder { color: var(--muted); }
.confirm-btn { padding: 14px; background: var(--accent2); border: 1px solid var(--accent); border-radius: 10px; color: var(--accent3); font-family: 'Noto Sans TC', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; text-align: center; }
.upload-all-btn { width: 100%; padding: 20px; background: var(--accent); border: none; border-radius: 12px; color: #fff; font-family: 'Noto Sans TC', sans-serif; font-size: 18px; font-weight: 900; cursor: pointer; display: none; box-shadow: 0 4px 16px rgba(181,149,106,0.3); }
.upload-all-btn.show { display: block; }
.upload-all-btn:disabled { opacity: 0.6; }
.success-banner { display: none; padding: 16px 18px; background: var(--accent2); border: 1px solid var(--accent); border-radius: 12px; text-align: center; flex-direction: column; gap: 4px; }
.success-banner.show { display: flex; }
.success-title { font-size: 15px; font-weight: 700; color: var(--accent3); }
.success-sub { font-size: 12px; color: var(--muted); font-family: 'Space Mono', monospace; }
.reset-btn { width: 100%; padding: 16px; background: transparent; border: 1px solid var(--border); border-radius: 12px; color: var(--muted); font-family: 'Noto Sans TC', sans-serif; font-size: 14px; cursor: pointer; display: none; }
.reset-btn.show { display: block; }
.timestamp { text-align: center; font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); padding-bottom: 20px; }
</style>
</head>
<body>
<div class="header">
  <span class="header-title" id="header-title">📦 包裝站</span>
  <span class="station-badge" id="clock">--:--:--</span>
</div>
<div class="main">
  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span class="status-text" id="status-text">請拍攝明細單取得交易序號</span>
  </div>
  <div class="steps-bar">
    <div class="step-pill" id="step1">① 明細單</div>
    <div class="step-pill" id="step2">② 內容物</div>
    <div class="step-pill" id="step3">③ 物流單</div>
    <div class="step-pill" id="step4">④ 包裝</div>
  </div>

  <!-- Step 1: 拍明細單，AI判讀序號 -->
  <div class="section enabled" id="sec-step1">
    <div class="section-label">① 拍攝明細單（右上角QR code處）</div>
    <div class="section-area">
      <button class="camera-btn" id="cam-btn1">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        拍攝明細單
      </button>
      <div style="font-size:12px;color:var(--muted);text-align:center;padding:4px 0;line-height:1.6;">
        📋 請將明細單<strong>正面朝上</strong><br>確保右上角 QR code 完整入鏡
      </div>
      <input class="photo-input-hidden" type="file" id="photo0-input" accept="image/*" capture="environment">
      <div class="preview-wrap" id="photo0-preview">
        <img class="preview-img" id="photo0-img" src="" alt="明細單">
        <button class="retake-btn" id="retake0">重拍</button>
      </div>
      <div class="ai-status" id="ai-status"></div>
      <div class="code-confirm-wrap" id="code-confirm-wrap">
        <div class="confirm-label">確認或修改交易序號</div>
        <input class="text-input" id="code-confirm-input" type="text"
          placeholder="例：035200010277053"
          autocomplete="off" autocapitalize="characters" spellcheck="false">
        <button class="confirm-btn" id="code-confirm-btn">確認序號，開始拍照 →</button>
      </div>
    </div>
  </div>

  <!-- Step 2: 內容物 -->
  <div class="section" id="sec-step2">
    <div class="section-label">② 拍攝內容物照片</div>
    <div class="section-area">
      <button class="camera-btn" id="cam-btn2">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        拍攝內容物
      </button>
      <input class="photo-input-hidden" type="file" id="photo1-input" accept="image/*" capture="environment">
      <div class="preview-wrap" id="photo1-preview">
        <img class="preview-img" id="photo1-img" src="" alt="內容物">
        <div class="photo-done-hint">✓ 已拍攝，請繼續下方步驟</div>
        <button class="retake-btn" id="retake1">重拍</button>
      </div>
    </div>
  </div>

  <!-- Step 3: 物流單 -->
  <div class="section" id="sec-step3">
    <div class="section-label">③ 拍攝物流單照片</div>
    <div class="section-area">
      <button class="camera-btn" id="cam-btn3">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        拍攝物流單
      </button>
      <input class="photo-input-hidden" type="file" id="photo2-input" accept="image/*" capture="environment">
      <div class="preview-wrap" id="photo2-preview">
        <img class="preview-img" id="photo2-img" src="" alt="物流單">
        <div class="photo-done-hint">✓ 已拍攝，請繼續下方步驟</div>
        <button class="retake-btn" id="retake2">重拍</button>
      </div>
    </div>
  </div>

  <!-- Step 4: 包裝完成 -->
  <div class="section" id="sec-step4">
    <div class="section-label">④ 拍攝包裝完成照片</div>
    <div class="section-area">
      <button class="camera-btn" id="cam-btn4">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        拍攝包裝完成
      </button>
      <input class="photo-input-hidden" type="file" id="photo3-input" accept="image/*" capture="environment">
      <div class="preview-wrap" id="photo3-preview">
        <img class="preview-img" id="photo3-img" src="" alt="包裝完成">
        <div class="photo-done-hint">✓ 已拍攝，請點上傳</div>
        <button class="retake-btn" id="retake3">重拍</button>
      </div>
    </div>
  </div>

  <button class="upload-all-btn" id="upload-all-btn">⬆ 上傳儲存</button>
  <div class="success-banner" id="success-banner">
    <div class="success-title">✓ 記錄完成</div>
    <div class="success-sub" id="success-info">—</div>
  </div>
  <button class="reset-btn" id="reset-btn">下一件包裹</button>
  <div class="timestamp" id="timestamp">—</div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzqXBFD3IKHbkJV9WKhK_Ew9qRWTME8cq00RnddDraCVi9j2EBzYmaJPH7sTJNHvrwd4w/exec';
const params = new URLSearchParams(window.location.search);
const STATION_NUM = params.get('station') || '1';
const STATION = '包裝站' + STATION_NUM;
document.getElementById('header-title').textContent = '📦 包裝站 ' + STATION_NUM;

let currentCode = null, currentTime = null;
let photos = { photo1: null, photo2: null, photo3: null }; // 不含明細單
let photo0File = null; // 明細單（只用於AI判讀，不上傳）

function updateClock() {
  const now = new Date(), pad = n => String(n).padStart(2,'0');
  document.getElementById('clock').textContent = pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
  document.getElementById('timestamp').textContent = now.getFullYear()+'/'+pad(now.getMonth()+1)+'/'+pad(now.getDate())+' '+pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
}
setInterval(updateClock, 1000); updateClock();

function fmt(d) {
  const pad = n => String(n).padStart(2,'0');
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());
}

function setStatus(type, msg) {
  document.getElementById('status-dot').className = 'status-dot'+(type?' '+type:'');
  document.getElementById('status-text').className = 'status-text'+(type?' '+type:'');
  document.getElementById('status-text').textContent = msg;
}

function setStep(n) {
  ['step1','step2','step3','step4'].forEach(function(id,i){
    var el = document.getElementById(id);
    if(i+1 < n) el.className='step-pill done';
    else if(i+1===n) el.className='step-pill active';
    else el.className='step-pill';
  });
}

function enableSection(id) {
  document.getElementById(id).className = 'section enabled';
}

function scrollTo(id) {
  setTimeout(function(){ document.getElementById(id).scrollIntoView({behavior:'smooth',block:'start'}); }, 300);
}

// ── Step 1: 拍明細單 ──
document.getElementById('cam-btn1').addEventListener('click', function(){
  document.getElementById('photo0-input').click();
});

document.getElementById('photo0-input').addEventListener('change', function(e){
  var file = e.target.files[0];
  if(!file) return;
  photo0File = file;
  var reader = new FileReader();
  reader.onload = function(ev){
    document.getElementById('photo0-img').src = ev.target.result;
    document.getElementById('photo0-preview').className = 'preview-wrap show';
    recognizeCode(file);
  };
  reader.readAsDataURL(file);
});

document.getElementById('retake0').addEventListener('click', function(){
  photo0File = null;
  document.getElementById('photo0-input').value = '';
  document.getElementById('photo0-preview').className = 'preview-wrap';
  document.getElementById('photo0-img').src = '';
  document.getElementById('ai-status').className = 'ai-status';
  document.getElementById('code-confirm-wrap').className = 'code-confirm-wrap';
  document.getElementById('code-confirm-input').value = '';
  currentCode = null;
});

// AI 判讀（透過 Apps Script，Key 不暴露）
async function recognizeCode(file) {
  var aiEl = document.getElementById('ai-status');
  aiEl.className = 'ai-status show';
  aiEl.textContent = '🔍 AI 判讀交易序號中...';
  setStatus('active', 'AI 判讀中...');

  try {
    var base64 = await new Promise(function(resolve){
      var reader = new FileReader();
      reader.onload = function(e){
        resolve(e.target.result.replace(/^data:image\/\w+;base64,/, ''));
      };
      reader.readAsDataURL(file);
    });

    var res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'recognize', image: base64 })
    });
    var result = await res.json();

    if (result.success) {
      currentCode = result.code.replace(/-/g,'');
      currentTime = new Date();
      aiEl.className = 'ai-status show success';
      aiEl.textContent = '✓ 判讀成功：' + result.code;
      document.getElementById('code-confirm-input').value = result.code;
      setStatus('active', '請確認交易序號');
    } else {
      throw new Error(result.error || '無法判讀');
    }

    document.getElementById('code-confirm-wrap').className = 'code-confirm-wrap show';

  } catch(err) {
    aiEl.className = 'ai-status show error';
    aiEl.textContent = '⚠ 判讀失敗，請手動輸入';
    document.getElementById('code-confirm-input').value = '';
    document.getElementById('code-confirm-wrap').className = 'code-confirm-wrap show';
    document.getElementById('code-confirm-input').focus();
    setStatus('error', '請手動輸入交易序號');
  }
}

// 確認序號按鈕
document.getElementById('code-confirm-btn').addEventListener('click', function(){
  var val = document.getElementById('code-confirm-input').value.trim().replace(/-/g,'').toUpperCase();
  if(!val){ alert('請輸入交易序號'); return; }
  currentCode = val;
  currentTime = new Date();
  enableSection('sec-step2');
  setStatus('active', '請拍攝內容物照片');
  setStep(2);
  scrollTo('sec-step2');
});

document.getElementById('code-confirm-input').addEventListener('keydown', function(e){
  if(e.key==='Enter') document.getElementById('code-confirm-btn').click();
});

// ── Step 2: 內容物 ──
document.getElementById('cam-btn2').addEventListener('click', function(){
  document.getElementById('photo1-input').click();
});
document.getElementById('photo1-input').addEventListener('change', function(e){
  handlePhoto(e, 'photo1', 'photo1-preview', 'photo1-img', function(){
    enableSection('sec-step3');
    setStatus('active', '請拍攝物流單照片');
    setStep(3);
    scrollTo('sec-step3');
  });
});
document.getElementById('retake1').addEventListener('click', function(){
  retakePhoto('photo1', 'photo1-input', 'photo1-preview', 'photo1-img');
  document.getElementById('sec-step3').className = 'section';
  document.getElementById('sec-step4').className = 'section';
  document.getElementById('upload-all-btn').className = 'upload-all-btn';
  photos.photo2 = null; photos.photo3 = null;
  ['photo2','photo3'].forEach(function(k){
    document.getElementById(k+'-input').value='';
    document.getElementById(k+'-preview').className='preview-wrap';
    document.getElementById(k+'-img').src='';
  });
  setStep(2);
});

// ── Step 3: 物流單 ──
document.getElementById('cam-btn3').addEventListener('click', function(){
  document.getElementById('photo2-input').click();
});
document.getElementById('photo2-input').addEventListener('change', function(e){
  handlePhoto(e, 'photo2', 'photo2-preview', 'photo2-img', function(){
    enableSection('sec-step4');
    setStatus('active', '請拍攝包裝完成照片');
    setStep(4);
    scrollTo('sec-step4');
  });
});
document.getElementById('retake2').addEventListener('click', function(){
  retakePhoto('photo2', 'photo2-input', 'photo2-preview', 'photo2-img');
  document.getElementById('sec-step4').className = 'section';
  document.getElementById('upload-all-btn').className = 'upload-all-btn';
  photos.photo3 = null;
  document.getElementById('photo3-input').value='';
  document.getElementById('photo3-preview').className='preview-wrap';
  document.getElementById('photo3-img').src='';
  setStep(3);
});

// ── Step 4: 包裝完成 ──
document.getElementById('cam-btn4').addEventListener('click', function(){
  document.getElementById('photo3-input').click();
});
document.getElementById('photo3-input').addEventListener('change', function(e){
  handlePhoto(e, 'photo3', 'photo3-preview', 'photo3-img', function(){
    document.getElementById('upload-all-btn').className = 'upload-all-btn show';
    setStatus('active', '四張照片完成，請上傳');
    scrollTo('upload-all-btn');
  });
});
document.getElementById('retake3').addEventListener('click', function(){
  retakePhoto('photo3', 'photo3-input', 'photo3-preview', 'photo3-img');
  document.getElementById('upload-all-btn').className = 'upload-all-btn';
  setStep(4);
});

function handlePhoto(e, key, previewId, imgId, onDone) {
  var file = e.target.files[0];
  if(!file) return;
  photos[key] = file;
  var reader = new FileReader();
  reader.onload = function(ev){
    document.getElementById(imgId).src = ev.target.result;
    document.getElementById(previewId).className = 'preview-wrap show';
    onDone();
  };
  reader.readAsDataURL(file);
}

function retakePhoto(key, inputId, previewId, imgId) {
  photos[key] = null;
  document.getElementById(inputId).value = '';
  document.getElementById(previewId).className = 'preview-wrap';
  document.getElementById(imgId).src = '';
}

// 壓縮
function compressImage(file, maxW, quality) {
  return new Promise(function(resolve){
    var reader = new FileReader();
    reader.onload = function(e){
      var img = new Image();
      img.onload = function(){
        var canvas = document.createElement('canvas');
        var w=img.width, h=img.height;
        if(w>maxW){ h=h*maxW/w; w=maxW; }
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// 上傳
document.getElementById('upload-all-btn').addEventListener('click', uploadAll);
async function uploadAll() {
  if(!photos.photo1||!photos.photo2||!photos.photo3||!currentCode) return;
  var btn = document.getElementById('upload-all-btn');
  btn.disabled=true; btn.textContent='上傳中，請稍候...';
  setStatus('active','壓縮照片中...');
  try {
    var p1=await compressImage(photos.photo1,1200,0.7);
    var p2=await compressImage(photos.photo2,1200,0.7);
    var p3=await compressImage(photos.photo3,1200,0.7);
    setStatus('active','上傳中...');
    var res=await fetch(SCRIPT_URL,{
      method:'POST',
      body:JSON.stringify({action:'upload',code:currentCode,time:fmt(currentTime),station:STATION,photo1:p1,photo2:p2,photo3:p3})
    });
    var result=await res.json();
    if(result.success){
      document.getElementById('success-banner').className='success-banner show';
      document.getElementById('success-info').textContent=currentCode+' · '+fmt(currentTime);
      document.getElementById('reset-btn').className='reset-btn show';
      btn.style.display='none';
      setStatus('active','記錄完成！');
    } else {
      throw new Error(result.error||'上傳失敗');
    }
  } catch(err) {
    setStatus('error','上傳失敗：'+err.message);
    btn.disabled=false; btn.textContent='⬆ 重新上傳';
  }
}

// Reset
document.getElementById('reset-btn').addEventListener('click', function(){
  currentCode=null; currentTime=null; photo0File=null;
  photos={photo1:null,photo2:null,photo3:null};
  ['photo0','photo1','photo2','photo3'].forEach(function(k){
    var inp=document.getElementById(k+'-input');
    var pre=document.getElementById(k+'-preview');
    var img=document.getElementById(k+'-img');
    if(inp) inp.value='';
    if(pre) pre.className='preview-wrap';
    if(img) img.src='';
  });
  document.getElementById('ai-status').className='ai-status';
  document.getElementById('ai-status').textContent='';
  document.getElementById('code-confirm-wrap').className='code-confirm-wrap';
  document.getElementById('code-confirm-input').value='';
  document.getElementById('sec-step1').className='section enabled';
  document.getElementById('sec-step2').className='section';
  document.getElementById('sec-step3').className='section';
  document.getElementById('sec-step4').className='section';
  var btn=document.getElementById('upload-all-btn');
  btn.className='upload-all-btn'; btn.disabled=false; btn.textContent='⬆ 上傳儲存';
  document.getElementById('success-banner').className='success-banner';
  document.getElementById('reset-btn').className='reset-btn';
  setStatus('','請拍攝明細單取得交易序號');
  setStep(1);
  window.scrollTo({top:0,behavior:'smooth'});
});

setStep(1);
</script>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>包裹查詢系統</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap');
:root {
  --bg: #f5f0eb; --surface: #ffffff; --surface2: #faf7f4;
  --border: #e0d6cc; --accent: #b5956a; --accent2: #f0e6d8;
  --accent3: #8a6d4e; --text: #3a2e24; --muted: #9c8878; --muted2: #d4c8bc;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 18px 40px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 1px 8px rgba(181,149,106,0.08); }
.logo { display: flex; align-items: center; gap: 14px; }
.logo-icon { width: 36px; height: 36px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.logo-text { font-family: 'Space Mono', monospace; font-size: 14px; color: var(--accent3); letter-spacing: 2px; }
.logo-sub { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; margin-top: 2px; }
.header-clock { font-family: 'Space Mono', monospace; font-size: 13px; color: var(--muted); }
.container { max-width: 1100px; margin: 0 auto; padding: 40px 24px; width: 100%; flex: 1; }
.search-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px; margin-bottom: 32px; box-shadow: 0 2px 12px rgba(181,149,106,0.08); }
.search-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.search-desc { font-size: 13px; color: var(--muted); margin-bottom: 24px; font-family: 'Space Mono', monospace; }
.search-row { display: flex; gap: 12px; }
.search-input { flex: 1; padding: 16px 20px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 16px; outline: none; transition: border-color 0.2s; letter-spacing: 1px; }
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--muted); font-size: 14px; letter-spacing: 0; }
.search-button { padding: 16px 32px; background: var(--accent); border: none; border-radius: 12px; color: #fff; font-family: 'Noto Sans TC', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.search-button:hover { background: var(--accent3); }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.section-title { font-size: 13px; font-family: 'Space Mono', monospace; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
.record-count { font-size: 12px; font-family: 'Space Mono', monospace; color: var(--muted); }
.result-area { display: none; margin-bottom: 32px; }
.result-area.show { display: block; }
.result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; box-shadow: 0 2px 12px rgba(181,149,106,0.08); }
.result-card.found { border-color: var(--accent); }
.result-card.not-found { border-color: var(--muted2); }
.result-header { padding: 20px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; background: var(--surface2); }
.result-status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.result-status-dot.found { background: var(--accent); box-shadow: 0 0 10px rgba(181,149,106,0.5); }
.result-status-dot.not-found { background: var(--muted); }
.result-header-title { font-size: 13px; font-family: 'Space Mono', monospace; color: var(--muted); letter-spacing: 1px; }
.result-header-code { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; margin-top: 2px; color: var(--accent3); }
.photos-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; padding: 24px 28px; border-bottom: 1px solid var(--border); }
@media (max-width: 700px) { .photos-grid { grid-template-columns: 1fr; } }
.photo-label { font-size: 10px; font-family: 'Space Mono', monospace; color: var(--muted); letter-spacing: 2px; margin-bottom: 8px; }
.photo-frame { width: 100%; aspect-ratio: 4/3; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.photo-frame img { width: 100%; height: 100%; object-fit: cover; }
.photo-placeholder { text-align: center; color: var(--muted); }
.photo-placeholder-icon { font-size: 28px; margin-bottom: 6px; }
.photo-placeholder-text { font-size: 11px; font-family: 'Space Mono', monospace; }
.info-row { padding: 20px 28px; display: flex; gap: 16px; flex-wrap: wrap; }
.info-item { padding: 12px 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; flex: 1; min-width: 140px; }
.info-item-label { font-size: 10px; font-family: 'Space Mono', monospace; color: var(--muted); letter-spacing: 2px; margin-bottom: 5px; }
.info-item-value { font-family: 'Space Mono', monospace; font-size: 14px; color: var(--text); word-break: break-all; }
.info-item-value.highlight { color: var(--accent3); font-size: 16px; font-weight: 700; }
.not-found-body { padding: 48px 28px; text-align: center; color: var(--muted); }
.not-found-icon { font-size: 48px; margin-bottom: 16px; }
.not-found-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
.not-found-sub { font-size: 13px; font-family: 'Space Mono', monospace; }
.records-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; box-shadow: 0 2px 12px rgba(181,149,106,0.08); }
.records-header { padding: 18px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface2); }
.records-title { font-size: 12px; font-family: 'Space Mono', monospace; color: var(--muted); letter-spacing: 2px; }
.records-badge { background: var(--accent2); color: var(--accent3); font-size: 11px; font-family: 'Space Mono', monospace; padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border); }
.record-row { display: flex; align-items: center; padding: 14px 24px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; gap: 14px; }
.record-row:last-child { border-bottom: none; }
.record-row:hover { background: var(--surface2); }
.record-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.record-code { font-family: 'Space Mono', monospace; font-size: 13px; flex: 1; color: var(--text); }
.record-time { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }
.record-thumbs { display: flex; gap: 4px; }
.record-thumb { width: 32px; height: 32px; border-radius: 5px; background: var(--bg); border: 1px solid var(--border); overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: var(--muted2); font-size: 12px; }
.record-thumb img { width: 100%; height: 100%; object-fit: cover; }
.loading-row { padding: 40px 24px; text-align: center; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 13px; }
.empty-records { padding: 40px 24px; text-align: center; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 13px; }
/* 放大燈箱 */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 999; align-items: center; justify-content: center; }
.lightbox.show { display: flex; }
.lightbox img { max-width: 95vw; max-height: 95vh; border-radius: 8px; }
.lightbox-close { position: absolute; top: 20px; right: 24px; color: #fff; font-size: 32px; cursor: pointer; }
</style>
</head>
<body>
<div class="header">
  <div class="logo">
    <div class="logo-icon">📦</div>
    <div>
      <div class="logo-text">SHIPMENT TRACKER</div>
      <div class="logo-sub">包裹查詢系統</div>
    </div>
  </div>
  <div class="header-clock" id="header-clock">—</div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">✕</span>
  <img id="lightbox-img" src="" alt="">
</div>

<div class="container">
  <div class="search-card">
    <div class="search-title">查詢包裹記錄</div>
    <div class="search-desc">輸入交易序號查詢出貨時間與三張照片</div>
    <div class="search-row">
      <input class="search-input" id="search-input" type="text"
        placeholder="輸入交易序號，例如 035200010277053"
        autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"
        onkeydown="if(event.key==='Enter') doSearch()">
      <button class="search-button" onclick="doSearch()">查詢</button>
    </div>
  </div>

  <div class="result-area" id="result-area">
    <div class="section-header"><span class="section-title">查詢結果</span></div>
    <div class="result-card" id="result-card"></div>
  </div>

  <div class="section-header">
    <span class="section-title">最近出貨記錄</span>
    <span class="record-count" id="record-count">載入中...</span>
  </div>
  <div class="records-card">
    <div class="records-header">
      <span class="records-title">RECENT SHIPMENTS</span>
      <span class="records-badge" id="today-count">今日 — 筆</span>
    </div>
    <div id="records-list"><div class="loading-row">載入中...</div></div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzqXBFD3IKHbkJV9WKhK_Ew9qRWTME8cq00RnddDraCVi9j2EBzYmaJPH7sTJNHvrwd4w/exec';

function updateClock() {
  const now = new Date(), pad = n => String(n).padStart(2,'0');
  document.getElementById('header-clock').textContent =
    `${now.getFullYear()}/${pad(now.getMonth()+1)}/${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
}
setInterval(updateClock, 1000); updateClock();

// 載入最近記錄
async function loadRecords() {
  try {
    const res = await fetch(`${SCRIPT_URL}?action=list`);
    const result = await res.json();
    if (result.success && result.records) {
      renderRecords(result.records);
    } else {
      renderRecords([]);
    }
  } catch {
    renderRecords([]);
  }
}

function renderRecords(records) {
  const list = document.getElementById('records-list');
  const today = new Date().toISOString().slice(0,10);
  const todayCount = records.filter(r => String(r.time).startsWith(today)).length;
  document.getElementById('record-count').textContent = `共 ${records.length} 筆`;
  document.getElementById('today-count').textContent = `今日 ${todayCount} 筆`;
  if (!records.length) { list.innerHTML = '<div class="empty-records">尚無出貨記錄<br>完成出貨後將自動顯示</div>'; return; }
  list.innerHTML = records.slice().reverse().slice(0, 50).map(r => `
    <div class="record-row" onclick="searchByRecord(${JSON.stringify(r).replace(/"/g,'&quot;')})">
      <div class="record-dot"></div>
      <div class="record-code">${r.code}</div>
      <div class="record-time">${r.time}</div>
      <div class="record-thumbs">
        ${['photo1','photo2','photo3'].map(k =>
          `<div class="record-thumb">${r[k] ? `<img src="${r[k]}" alt="">` : '📷'}</div>`
        ).join('')}
      </div>
    </div>
  `).join('');
}

async function doSearch() {
  const raw = document.getElementById('search-input').value.trim().replace(/-/g,'').toUpperCase();
  if (!raw) return;
  const area = document.getElementById('result-area');
  const card = document.getElementById('result-card');
  area.className = 'result-area show';
  card.className = 'result-card';
  card.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted);font-family:Space Mono,monospace">查詢中...</div>';
  area.scrollIntoView({ behavior: 'smooth', block: 'start' });

  try {
    const res = await fetch(`${SCRIPT_URL}?code=${raw}`);
    const result = await res.json();
    if (result.success && result.record) {
      showResult(result.record);
    } else {
      showNotFound(raw);
    }
  } catch {
    showNotFound(raw);
  }
}

function searchByRecord(r) {
  document.getElementById('search-input').value = r.code;
  showResult(r);
  document.getElementById('result-area').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function showResult(record) {
  const card = document.getElementById('result-card');
  document.getElementById('result-area').className = 'result-area show';
  card.className = 'result-card found';
  card.innerHTML = `
    <div class="result-header">
      <div class="result-status-dot found"></div>
      <div>
        <div class="result-header-title">FOUND · 查詢成功</div>
        <div class="result-header-code">${record.code}</div>
      </div>
    </div>
    <div class="photos-grid">
      ${[['photo1','① 內容物照片'],['photo2','② 物流單照片'],['photo3','③ 包裝完成照片']].map(([k,label]) => `
        <div>
          <div class="photo-label">${label}</div>
          <div class="photo-frame" onclick="${record[k] ? `openLightbox('${record[k]}')` : ''}">
            ${record[k]
              ? `<img src="${record[k]}" alt="${label}">`
              : `<div class="photo-placeholder"><div class="photo-placeholder-icon">📷</div><div class="photo-placeholder-text">尚無照片</div></div>`}
          </div>
        </div>
      `).join('')}
    </div>
    <div class="info-row">
      <div class="info-item"><div class="info-item-label">交易序號</div><div class="info-item-value highlight">${record.code}</div></div>
      <div class="info-item"><div class="info-item-label">出貨時間</div><div class="info-item-value">${record.time}</div></div>
      <div class="info-item"><div class="info-item-label">包裝站</div><div class="info-item-value">${record.station || '—'}</div></div>
    </div>
  `;
}

function showNotFound(code) {
  const card = document.getElementById('result-card');
  card.className = 'result-card not-found';
  card.innerHTML = `
    <div class="not-found-body">
      <div class="not-found-icon">🔍</div>
      <div class="not-found-title">查無此編號</div>
      <div class="not-found-sub">${code}<br><br>請確認編號是否正確，或尚未完成出貨記錄</div>
    </div>
  `;
}

function openLightbox(url) {
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox').className = 'lightbox show';
}
function closeLightbox() {
  document.getElementById('lightbox').className = 'lightbox';
  document.getElementById('lightbox-img').src = '';
}

loadRecords();
</script>
</body>
</html>
